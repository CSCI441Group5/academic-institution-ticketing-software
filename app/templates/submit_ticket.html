<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Ticket - Automated School Ticketing System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
<div class="page-container">

    <!-- Header -->
    <div class="header">
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">

        <h2>
            Signed in as: {{ session.get("user_full_name") }} ({{session.get("user_role") }})
        </h2>
    </div>

    <!-- Control Panel -->
    <div class="control-panel">
        <button id="theme-toggle">Toggle Theme</button>
        <button id="text-bigger">A+</button>
        <button id="text-reset">A</button>
        <button id="text-smaller">A-</button>

        <form action="{{ url_for('auth.logout') }}" method="POST">
            <button type="submit">Sign Out</button>
        </form>
    </div>

    <script src="{{url_for('static', filename='js/theme.js')}}"></script>

    <h1>Submit Ticket</h1>

    {% if success %}
        <p>Ticket created successfully (ID: {{ ticket_id }}).</p>
    {% endif %}

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}

    <!-- Form -->
    <form action="{{ url_for('auth.new_ticket') }}" method="POST">

        <label for="title">Title:</label>
        <input type="text" id="title" name="title"
               placeholder="Brief summary of the issue" required>
        <br><br>

        <label for="category">Category:</label>
        <select id="category" name="category" required>
            <option value="">Select a category</option>
            <option value="IT">IT</option>
            <option value="Facilities">Facilities</option>
            <option value="Academic Support">Academic Support</option>
        </select>
        <br><br>

        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="5" required></textarea>
        <br><br>

        <label for="attachment">Attachment (optional):</label>
        <input type="text" id="attachment" name="attachment"
               placeholder="File name or link">
        <br><br>

        <button type="submit">Create Ticket</button>
    </form>

    <p>
        <a href="{{ url_for('auth.dashboard') }}">
            <button type="button">Back to Dashboard</button>
        </a>
    </p>

</div>
</body>
</html>
